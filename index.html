precision highp float;

uniform vec2 uResolution;

float pingPong(float x, float len) {
    float m = mod(x, len * 2.0);

    p.x *= aspect;
    p = mat2(cc, -s, s, cc) * p;
    p.x /= aspect;
    return p + c;

vec2 reflectUV(vec2 uv, float segments, vec2 c, float aspect) {
    vec2 p = uv - c;
    p.x *= aspect;
    float ang = atan(p.y, p.x);
    float rad = length(p);
    float stepA = 6.28318530718 / segments;
    ang = mod(ang, stepA);
    ang = abs(ang - stepA * 0.5);
    vec2 r = vec2(cos(ang), sin(ang)) * rad;
    r.x /= aspect;
    return r + c;

vec2 fractalFold(vec2 uv, float zoom, float t, vec2 c, float aspect) {
    vec2 p = uv;
    for (int i = 0; i < 3; i++) {
        p = abs((p - c) * (zoom + 0.15 * sin(t * 0.35 + float(i)))) - 0.5 + c;
        p = rotateUV(p, t * 0.12 + float(i) * 0.07, c, aspect);

    vec2 ts = 1.0 / res;
    vec3 s00 = texture(uTexture, uv + ts * vec2(-1, -1)).rgb;
    vec3 s10 = texture(uTexture, uv + ts * vec2( 0, -1)).rgb;

    vec3 s21 = texture(uTexture, uv + ts * vec2( 1,  0)).rgb;
    vec3 s02 = texture(uTexture, uv + ts * vec2(-1,  1)).rgb;
    vec3 s12 = texture(uTexture, uv + ts * vec2( 0,  1)).rgb;
    vec3 s22 = texture(uTexture, uv + ts * vec2( 1,  1)).rgb;

    return tentBlur3(uv, uResolution) * 0.7;

float diamondRadius(vec2 p) {
    p = sin(abs(p));
    return max(p.x, p.y);

vec2 diamondFold(vec2 uv, vec2 c, float aspect) {
    vec2 p = (uv - c) * vec2(aspect, 1.0);
    p = abs(p);

    vec3 baseCol = preBlendColor(fragTexCoord);

    float seg = 4.0 + 2.0 * sin(time_f * 0.33);

    kUV = diamondFold(kUV, m, aspect);

    float foldZoom = 1.15 + 0.15 * sin(time_f * 0.42);
    kUV = fractalFold(kUV, foldZoom, time_f, m, aspect);
    kUV = rotateUV(kUV, time_f * 0.23, m, aspect);
    kUV = diamondFold(kUV, m, aspect);

    vec2 p = (kUV - m) * ar;
    vec2 q = abs(p);
    if (q.y > q.x) q = q.yx;

    float base = 1.82 + 0.18 * pingPong(sin(time_f * 0.2) * (PI * time_f), 5.0);
    float period = log(base) * pingPong(time_f * PI, 5.0);
